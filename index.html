<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mapa de Servicios</title>

<link
href="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.css"
rel="stylesheet"
/>

<style>

html, body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
}

#map{
    width:100vw;
    height:100vh;
}

.mapboxgl-popup-content{
    font-family:Arial, sans-serif;
    border-radius:12px;
    padding:12px;
}

#buscador{
    position:absolute;
    top:15px;
    left:15px;
    z-index:999;
    background:white;
    padding:10px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
}

#buscador input{
    width:110px;
}
#capas{
    position:absolute;
    top:90px;
    left:15px;
    z-index:999;
    background:white;
    padding:10px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
}
    #panel-lista{
    position:absolute;
    top:220px;
    left:15px;
    width:250px;
    max-height:400px;
    overflow-y:auto;
    background:white;
    padding:10px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.2);
    z-index:999;
}
</style>

</head>

<body>
<div id="capas">

<label>
<input type="checkbox" checked onchange="toggleLayer('pins')">
Servicios
</label><br>

<label>
<input type="checkbox" checked onchange="toggleLayer('pins-senador')">
Senador
</label><br>

<label>
<input type="checkbox" checked onchange="toggleLayer('pins-equipo')">
Equipo
</label>

</div>
    <div id="panel-lista">

<h3>Actividades</h3>

<div id="lista-actividades">

Sin elementos

</div>

</div>
<div id="buscador">
    <input type="number" id="seccionInput" placeholder="Buscar sección">
    <button onclick="buscarSeccion()">Ir</button>
</div>

<div id="map"></div>

<script src="https://api.mapbox.com/mapbox-gl-js/v3.3.0/mapbox-gl.js"></script>

<script>

mapboxgl.accessToken =
"pk.eyJ1IjoiamRhcmlvdnoiLCJhIjoiY21wbGx4bTJ6MjZ3NDJ4cHQ2Y3NvcTA3bCJ9.wCONIcDFuubKj_Irb8NdRQ";

const map = new mapboxgl.Map({
    container: "map",
    style: "mapbox://styles/jdariovz/cmplmosub009r01snddodbh7z",
    center: [-100.3161, 25.6866],
    zoom: 10.2
});

function buscarSeccion(){

    const seccion = document
        .getElementById("seccionInput")
        .value
        .trim();

    if(!seccion) return;

    const features = map.querySourceFeatures("secciones-local");

    const encontrada = features.find(
        f => String(f.properties.SECCION_2026) === seccion
    );

    if(!encontrada){
        alert("Sección no encontrada");
        return;
    }

    map.setFilter(
        "resaltado-seccion",
        ["==","SECCION_2026",encontrada.properties.SECCION_2026]
    );

    const bounds = new mapboxgl.LngLatBounds();

    // Para Polygon y MultiPolygon
    let coords;

    if(encontrada.geometry.type === "Polygon"){
        coords = encontrada.geometry.coordinates[0];
    }
    else{
        coords = encontrada.geometry.coordinates[0][0];
    }

    coords.forEach(coord=>{
        bounds.extend(coord);
    });

    map.fitBounds(bounds,{
        padding:40
    });

}
function toggleLayer(id){

    const visible =
        map.getLayoutProperty(id,"visibility");

    if(visible === "none"){

        map.setLayoutProperty(
            id,
            "visibility",
            "visible"
        );

    } else {

        map.setLayoutProperty(
            id,
            "visibility",
            "none"
        );

    }

}
map.on("load",()=>{

    // Servicios
    map.addSource("simpatizantes",{
        type:"geojson",
        data:"https://script.google.com/macros/s/AKfycbxLaxqrumjT7zqjryDygDedvAejU04S46ZNVO70ROV9ylbPrqUpbbdkRMWwECDUMuI3/exec"
    });
    map.addSource("senador", {
  type: "geojson",
  data: "https://script.google.com/macros/s/AKfycbz-KYyqBIAkw6DgSOcg9iIPTrbtK3zjQbiCBpeS3i3L0VtqNS5kpxP1koutww8uYKvpKw/exec"
});

map.addSource("equipo", {
  type: "geojson",
  data: "https://script.google.com/macros/s/AKfycbz26NHWn4zO9T8QC8OAqfFleShlGG-iQG7vPErbpjCvFlbd0Iy5RfL4fncnqMGrmEJj7Q/exec"
});
    map.addLayer({
        id:"pins",
        type:"circle",
        source:"simpatizantes",
        paint:{
            "circle-radius":8,
            "circle-color":"#00e5ff",
            "circle-stroke-width":2,
            "circle-stroke-color":"#ffffff"
        }
    });
    map.addLayer({
  id: "pins-senador",
  type: "circle",
  source: "senador",
  paint: {
    "circle-radius": 8,
    "circle-color": "#ff0000",
    "circle-stroke-width": 2,
    "circle-stroke-color": "#ffffff"
  }
});
    map.addLayer({
  id: "pins-equipo",
  type: "circle",
  source: "equipo",
  paint: {
    "circle-radius": 8,
    "circle-color": "#00aa00",
    "circle-stroke-width": 2,
    "circle-stroke-color": "#ffffff"
  }
});

    // GeoJSON completo del estado
    map.addSource("secciones-local",{
        type:"geojson",
        data:"https://raw.githubusercontent.com/JoanDario/mapa-servicios/main/PRIORIDAD%202027.geojson"
    });

    // Resaltado amarillo
    map.addLayer({
        id:"resaltado-seccion",
        type:"line",
        source:"secciones-local",
        paint:{
            "line-color":"#ffff00",
            "line-width":5
        },
        filter:["==","SECCION_2026",""]
    });

    // Popups
    map.on("click","pins",(e)=>{

        const props = e.features[0].properties;

        new mapboxgl.Popup()
        .setLngLat(e.lngLat)
        .setHTML(`
            <h3>${props.nombre}</h3>

            <p>
            <b>Servicio:</b><br>
            ${props.servicio}
            </p>

            <p>
            <b>Status:</b><br>
            ${props.status}
            </p>
        `)
        .addTo(map);

    });
    map.on("click", "pins-senador", (e) => {

  const props = e.features[0].properties;

  new mapboxgl.Popup()
    .setLngLat(e.lngLat)
    .setHTML(`
      <h3>Actividad del Senador</h3>

      <p>
        <b>Fecha:</b><br>
        ${props.fecha}
      </p>

      <p>
        <b>Actividad:</b><br>
        ${props.actividad}
      </p>

      <p>
        <b>Ubicación:</b><br>
        ${props.ubicacion}
      </p>

      <p>
        <b>Aforo:</b><br>
        ${props.aforo}
      </p>

      <p>
        <b>Comentario:</b><br>
        ${props.comentario}
      </p>
    `)
    .addTo(map);

});
    map.on("click", "pins-equipo", (e) => {

  const props = e.features[0].properties;

  new mapboxgl.Popup()
    .setLngLat(e.lngLat)
    .setHTML(`
      <h3>Actividad del Equipo</h3>

      <p>
        <b>Fecha:</b><br>
        ${props.fecha}
      </p>

      <p>
        <b>Actividad:</b><br>
        ${props.actividad}
      </p>

      <p>
        <b>Ubicación:</b><br>
        ${props.ubicacion}
      </p>

      <p>
        <b>Aforo:</b><br>
        ${props.aforo}
      </p>

      <p>
        <b>Comentario:</b><br>
        ${props.comentario}
      </p>
    `)
    .addTo(map);

});
fetch("https://script.google.com/macros/s/AKfycbz-KYyqBIAkw6DgSOcg9iIPTrbtK3zjQbiCBpeS3i3L0VtqNS5kpxP1koutww8uYKvpKw/exec")
.then(response => response.json())
.then(data => {

    let html = "";

    data.features.forEach(item => {

        html += `
        <div
style="
margin-bottom:15px;
padding-bottom:10px;
border-bottom:1px solid #ddd;
cursor:pointer;
"
onclick="irActividad(
${item.geometry.coordinates[0]},
${item.geometry.coordinates[1]}
)"
>

            <b>${new Date(item.properties.fecha).toLocaleDateString("es-MX")}</b><br>
            ${item.properties.actividad}<br>
            <small>${item.properties.ubicacion}</small>
        </div>
        `;

    });

    document.getElementById("lista-actividades").innerHTML = html;

});
    });   // ← cierre del map.on("load")
</script>

</body>
</html>
